services:
  - type: web
    name: kerem-server
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: kerem-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
